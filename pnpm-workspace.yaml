packages:
  - "apps/web"

# Force postcss to >= 8.5.10 globally; next@15 ships 8.4.31 which has a CVE
overrides:
  postcss: ">=8.5.10"

# Per-dependency build-script approval (pnpm's canonical location — the `pnpm`
# field in package.json is no longer read by pnpm v11). The native-binary
# packages are approved; msw is denied (its browser service-worker build isn't
# needed — there are no MSW-based tests).
allowBuilds:
  "@biomejs/biome": true
  "@parcel/watcher": true
  "@swc/core": true
  esbuild: true
  sharp: true
  msw: false
