# =============================================================================
# WEKALA PLATFORM — GitHub Actions CI
#
# Triggers: push to any branch + PR to main.
# Jobs (all must pass to merge):
#   secrets        → gitleaks secret scan
#   validate-infra → repo structure, .gitignore, compose syntax, .env.example
#   quality-py     → ruff + mypy  (Phase 1+ when apps/api exists)
#   quality-ts     → biome + tsc  (Phase 1+ when apps/web exists)
#   test-py        → pytest       (Phase 1+)
#   test-ts        → vitest       (Phase 1+)
#   audit          → pip-audit + pnpm audit
# =============================================================================

name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ---------------------------------------------------------------------------
  # Secret scanning — runs first, blocks all other jobs if it finds a secret
  # ---------------------------------------------------------------------------
  secrets:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ---------------------------------------------------------------------------
  # Infrastructure validation — no running stack needed; pure static checks.
  # Verifies the repo structure, .gitignore, .env.example, and compose syntax.
  # ---------------------------------------------------------------------------
  validate-infra:
    name: Validate infrastructure
    runs-on: ubuntu-latest
    needs: secrets
    steps:
      - uses: actions/checkout@v4

      - name: Required files present
        run: |
          missing=0
          files=(
            ".gitignore"
            ".env.example"
            "README.md"
            "PHASE_LOG.md"
            "docker-compose.yml"
            "Makefile"
            ".pre-commit-config.yaml"
            ".github/PULL_REQUEST_TEMPLATE.md"
            ".github/workflows/ci.yml"
            "scripts/keygen.js"
            "infra/supabase/kong.yml"
            "infra/supabase/volumes/db/roles.sql"
            "infra/supabase/volumes/db/jwt.sql"
            "infra/supabase/volumes/db/realtime.sql"
            "infra/supabase/volumes/db/webhooks.sql"
            "docs/adr/0000-template.md"
          )
          for f in "${files[@]}"; do
            if [ ! -f "$f" ]; then
              echo "MISSING: $f"
              missing=$((missing+1))
            fi
          done
          [ "$missing" -eq 0 ] && echo "All required files present." || exit 1

      - name: .gitignore covers secrets and build artefacts
        run: |
          fail=0
          for p in ".env" "node_modules" "__pycache__" "*.pem" ".DS_Store"; do
            grep -q "$p" .gitignore || { echo "MISSING pattern in .gitignore: $p"; fail=1; }
          done
          [ "$fail" -eq 0 ] && echo ".gitignore OK" || exit 1

      - name: .env.example uses only placeholder values for secrets
        run: |
          fail=0
          keys=(
            SUPABASE_ANON_KEY SUPABASE_SERVICE_ROLE_KEY
            DIFY_SECRET_KEY DIFY_SANDBOX_API_KEY WEKALA_SECRET_KEY
            MEILI_MASTER_KEY N8N_ENCRYPTION_KEY N8N_USER_MANAGEMENT_JWT_SECRET
            LANGFUSE_SECRET_KEY LANGFUSE_NEXTAUTH_SECRET LANGFUSE_SALT
            CLICKHOUSE_PASSWORD WEKALA_SUPABASE_SERVICE_KEY NEXT_PUBLIC_SUPABASE_ANON_KEY
          )
          for key in "${keys[@]}"; do
            val=$(grep "^${key}=" .env.example | cut -d= -f2-)
            if [ -z "$val" ]; then
              echo "MISSING key in .env.example: $key"
              fail=1
            elif [[ "$val" != CHANGE_ME* ]]; then
              echo "REAL VALUE in .env.example for $key (must be CHANGE_ME placeholder)"
              fail=1
            fi
          done
          [ "$fail" -eq 0 ] && echo ".env.example placeholders OK" || exit 1

      - name: docker-compose.yml syntax valid
        run: |
          # Write a temporary .env with placeholder values — avoids xargs splitting
          # on spaces in values like STUDIO_DEFAULT_ORGANIZATION=Wekala Dev.
          grep -v '^#' .env.example \
            | grep '=' \
            | sed 's/=CHANGE_ME.*/=placeholder/' \
            > /tmp/compose-check.env
          docker compose --env-file /tmp/compose-check.env config --quiet
          echo "docker-compose.yml syntax OK"

  # ---------------------------------------------------------------------------
  # Python quality — ruff lint + ruff format check + mypy
  # Skips gracefully when apps/api does not yet exist (Phase 0).
  # ---------------------------------------------------------------------------
  quality-py:
    name: Python quality (ruff + mypy)
    runs-on: ubuntu-latest
    needs: secrets
    steps:
      - uses: actions/checkout@v4

      - name: Check if Python app exists
        id: check-py
        run: |
          if [ -d "apps/api" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "::notice::apps/api not found — skipping Python quality checks (Phase 0)"
          fi

      - uses: actions/setup-python@v5
        if: steps.check-py.outputs.exists == 'true'
        with:
          python-version: "3.13"

      - name: Install uv
        if: steps.check-py.outputs.exists == 'true'
        run: pip install uv

      - name: Install Python deps
        if: steps.check-py.outputs.exists == 'true'
        working-directory: apps/api
        run: uv sync --dev

      - name: Ruff lint
        if: steps.check-py.outputs.exists == 'true'
        working-directory: apps/api
        run: uv run ruff check .

      - name: Ruff format check
        if: steps.check-py.outputs.exists == 'true'
        working-directory: apps/api
        run: uv run ruff format --check .

      - name: Mypy type check
        if: steps.check-py.outputs.exists == 'true'
        working-directory: apps/api
        run: uv run mypy .

  # ---------------------------------------------------------------------------
  # TypeScript quality — biome lint + format + tsc type check
  # Skips gracefully when apps/web does not yet exist (Phase 0).
  # ---------------------------------------------------------------------------
  quality-ts:
    name: TypeScript quality (biome + tsc)
    runs-on: ubuntu-latest
    needs: secrets
    steps:
      - uses: actions/checkout@v4

      - name: Check if TS app exists
        id: check-ts
        run: |
          if [ -d "apps/web" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "::notice::apps/web not found — skipping TypeScript quality checks (Phase 0)"
          fi

      - uses: actions/setup-node@v4
        if: steps.check-ts.outputs.exists == 'true'
        with:
          node-version: "24"

      - name: Enable corepack + pnpm
        if: steps.check-ts.outputs.exists == 'true'
        run: corepack enable && corepack prepare pnpm@latest --activate

      - name: Install Node deps
        if: steps.check-ts.outputs.exists == 'true'
        run: pnpm install --frozen-lockfile

      - name: Biome check
        if: steps.check-ts.outputs.exists == 'true'
        run: pnpm --filter web biome ci .

      - name: TypeScript type check
        if: steps.check-ts.outputs.exists == 'true'
        run: pnpm --filter web tsc --noEmit

  # ---------------------------------------------------------------------------
  # Python tests — pytest
  # ---------------------------------------------------------------------------
  test-py:
    name: Python tests (pytest)
    runs-on: ubuntu-latest
    needs: quality-py
    steps:
      - uses: actions/checkout@v4

      - name: Check if Python app exists
        id: check-py
        run: |
          if [ -d "apps/api" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "::notice::apps/api not found — skipping pytest (Phase 0)"
          fi

      - uses: actions/setup-python@v5
        if: steps.check-py.outputs.exists == 'true'
        with:
          python-version: "3.13"

      - name: Install uv + deps
        if: steps.check-py.outputs.exists == 'true'
        working-directory: apps/api
        run: pip install uv && uv sync --dev

      - name: Run pytest
        if: steps.check-py.outputs.exists == 'true'
        working-directory: apps/api
        run: uv run pytest tests/ -v --tb=short

  # ---------------------------------------------------------------------------
  # TypeScript tests — vitest
  # ---------------------------------------------------------------------------
  test-ts:
    name: TypeScript tests (vitest)
    runs-on: ubuntu-latest
    needs: quality-ts
    steps:
      - uses: actions/checkout@v4

      - name: Check if TS app exists
        id: check-ts
        run: |
          if [ -d "apps/web" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "::notice::apps/web not found — skipping vitest (Phase 0)"
          fi

      - uses: actions/setup-node@v4
        if: steps.check-ts.outputs.exists == 'true'
        with:
          node-version: "24"

      - name: Enable corepack + pnpm
        if: steps.check-ts.outputs.exists == 'true'
        run: corepack enable && corepack prepare pnpm@latest --activate

      - name: Install deps
        if: steps.check-ts.outputs.exists == 'true'
        run: pnpm install --frozen-lockfile

      - name: Run vitest
        if: steps.check-ts.outputs.exists == 'true'
        run: pnpm --filter web vitest run

  # ---------------------------------------------------------------------------
  # Dependency audit — pip-audit (Python) + pnpm audit (Node)
  # Reports known CVEs in dependencies.
  # ---------------------------------------------------------------------------
  audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    needs: secrets
    steps:
      - uses: actions/checkout@v4

      - name: Check if Python app exists
        id: check-py
        run: |
          [ -d "apps/api" ] && echo "exists=true" >> "$GITHUB_OUTPUT" || echo "exists=false" >> "$GITHUB_OUTPUT"

      - name: Check if Node app exists
        id: check-ts
        run: |
          [ -d "apps/web" ] && echo "exists=true" >> "$GITHUB_OUTPUT" || echo "exists=false" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-python@v5
        if: steps.check-py.outputs.exists == 'true'
        with:
          python-version: "3.13"

      - name: pip-audit
        if: steps.check-py.outputs.exists == 'true'
        working-directory: apps/api
        run: pip install uv pip-audit && pip-audit --requirement <(uv export --no-hashes)

      - uses: actions/setup-node@v4
        if: steps.check-ts.outputs.exists == 'true'
        with:
          node-version: "24"

      - name: Enable corepack + pnpm
        if: steps.check-ts.outputs.exists == 'true'
        run: corepack enable && corepack prepare pnpm@latest --activate

      - name: pnpm audit
        if: steps.check-ts.outputs.exists == 'true'
        run: pnpm install --frozen-lockfile && pnpm audit --audit-level moderate
