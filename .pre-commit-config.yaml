# =============================================================================
# WEKALA PLATFORM — pre-commit configuration
#
# Hooks run in this order on every commit:
#   1. gitleaks   — secret scanning (blocks if secrets found)
#   2. ruff       — Python lint + format check
#   3. biome      — TypeScript/JavaScript lint + format check
#   4. conventional-pre-commit — commit message format enforcement
#
# Install:  make install-hooks
# Run manually:  pre-commit run --all-files
# =============================================================================

default_stages: [pre-commit]
fail_fast: true

repos:

  # ---------------------------------------------------------------------------
  # gitleaks — detect hardcoded secrets BEFORE they reach git history
  # ---------------------------------------------------------------------------
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.1
    hooks:
      - id: gitleaks

  # ---------------------------------------------------------------------------
  # ruff — Python linting and formatting (replaces flake8 + isort + black)
  # ---------------------------------------------------------------------------
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # ---------------------------------------------------------------------------
  # biome — TypeScript / JavaScript lint + format
  # ---------------------------------------------------------------------------
  - repo: https://github.com/biomejs/pre-commit
    rev: v0.6.1
    hooks:
      - id: biome-ci
        additional_dependencies: ["@biomejs/biome@1.9.4"]

  # ---------------------------------------------------------------------------
  # General file hygiene
  # ---------------------------------------------------------------------------
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: check-json
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=1000]
      - id: detect-private-key
      - id: mixed-line-ending
        args: [--fix=lf]

  # ---------------------------------------------------------------------------
  # conventional-pre-commit — enforce Conventional Commits on commit messages
  # Runs on commit-msg stage (not pre-commit stage).
  # ---------------------------------------------------------------------------
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v3.6.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args:
          - feat
          - fix
          - refactor
          - test
          - docs
          - chore
          - perf
          - style
          - security
          - revert
