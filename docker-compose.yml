# =============================================================================
# WEKALA PLATFORM — Docker Compose
# Phase 1: Authentication, Authorization, Multi-tenancy
#
# Services: Supabase · Dify · Ollama · Meilisearch · n8n · Langfuse · MailHog
#           wekala-api · wekala-web · opa
# Memory budgets per Rule 9 (CLAUDE.md §9):
#   Supabase (all)  2 GB · Dify (all)  3 GB · Langfuse 1 GB
#   Meilisearch  512 MB · n8n  512 MB · Ollama → VRAM only
#   wekala-api  512 MB · wekala-web  512 MB · opa  128 MB
# =============================================================================

services:

  # ===========================================================================
  # SUPABASE — Postgres + GoTrue + PostgREST + Realtime + Storage + Studio
  # All traffic goes through Kong on port 8000; Studio on port 54323.
  # ===========================================================================

  supabase-db:
    image: supabase/postgres:15.8.1.085
    container_name: wekala-supabase-db
    restart: unless-stopped
    environment:
      POSTGRES_HOST: /var/run/postgresql
      POSTGRES_PORT: 5432
      POSTGRES_DB: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${SUPABASE_JWT_SECRET}
      JWT_EXP: ${JWT_EXPIRY}
    volumes:
      - supabase-db-data:/var/lib/postgresql/data
      - ./infra/supabase/volumes/db/roles.sql:/docker-entrypoint-initdb.d/migrations/99-roles.sql:ro
      - ./infra/supabase/volumes/db/jwt.sql:/docker-entrypoint-initdb.d/migrations/99-jwt.sql:ro
      - ./infra/supabase/volumes/db/realtime.sql:/docker-entrypoint-initdb.d/migrations/99-realtime.sql:ro
      - ./infra/supabase/volumes/db/webhooks.sql:/docker-entrypoint-initdb.d/migrations/97-webhooks.sql:ro
    ports:
      - "5432:5432"
    networks:
      - supabase_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 512m

  supabase-studio:
    image: supabase/studio:2026.04.27-sha-5f60601
    container_name: wekala-supabase-studio
    restart: unless-stopped
    environment:
      STUDIO_PG_META_URL: http://supabase-meta:8080
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      SUPABASE_URL: http://supabase-kong:8000
      SUPABASE_PUBLIC_URL: ${SUPABASE_PUBLIC_URL}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      AUTH_JWT_SECRET: ${SUPABASE_JWT_SECRET}
      DEFAULT_ORGANIZATION_NAME: ${STUDIO_DEFAULT_ORGANIZATION}
      DEFAULT_PROJECT_NAME: ${STUDIO_DEFAULT_PROJECT}
      HOSTNAME: "0.0.0.0"
    ports:
      - "54323:3000"
    networks:
      - supabase_net
      - wekala_net
    depends_on:
      supabase-meta:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000/',r=>process.exit(r.statusCode<400?0:1)).on('error',()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 256m

  supabase-kong:
    image: kong/kong:3.9.1
    container_name: wekala-supabase-kong
    restart: unless-stopped
    # Pre-process kong.yml template: Docker Compose expands ${VAR} at compose
    # time into the entrypoint string; $$ becomes a literal $ (sed search).
    entrypoint:
      - sh
      - -c
      - >-
        sed
        's|$${SUPABASE_ANON_KEY}|${SUPABASE_ANON_KEY}|g;
        s|$${SUPABASE_SERVICE_KEY}|${SUPABASE_SERVICE_ROLE_KEY}|g'
        /tmp/kong-template.yml > /tmp/kong-processed.yml &&
        exec /entrypoint.sh kong docker-start
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /tmp/kong-processed.yml
      KONG_DNS_ORDER: LAST,A,CNAME
      KONG_PLUGINS: bundled
      KONG_NGINX_WORKER_PROCESSES: "2"
      KONG_NGINX_PROXY_PROXY_BUFFER_SIZE: 160k
      KONG_NGINX_PROXY_PROXY_BUFFERS: 64 160k
    volumes:
      - ./infra/supabase/kong.yml:/tmp/kong-template.yml:ro
    ports:
      - "8000:8000"
      - "8443:8443"
    networks:
      - supabase_net
      - wekala_net
    depends_on:
      supabase-auth:
        condition: service_healthy
      supabase-rest:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "kong health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 1024m

  supabase-auth:
    image: supabase/gotrue:v2.186.0
    container_name: wekala-supabase-auth
    restart: unless-stopped
    environment:
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: 9999
      API_EXTERNAL_URL: ${SUPABASE_PUBLIC_URL}
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgres://supabase_auth_admin:${POSTGRES_PASSWORD}@supabase-db:5432/postgres
      GOTRUE_SITE_URL: ${SITE_URL}
      GOTRUE_URI_ALLOW_LIST: ${ADDITIONAL_REDIRECT_URLS}
      GOTRUE_DISABLE_SIGNUP: ${DISABLE_SIGNUP}
      GOTRUE_JWT_ADMIN_ROLES: service_role
      GOTRUE_JWT_AUD: authenticated
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
      GOTRUE_JWT_EXP: ${JWT_EXPIRY}
      GOTRUE_JWT_SECRET: ${SUPABASE_JWT_SECRET}
      GOTRUE_EXTERNAL_EMAIL_ENABLED: "true"
      GOTRUE_MAILER_AUTOCONFIRM: "false"
      GOTRUE_PASSWORD_MIN_LENGTH: ${GOTRUE_PASSWORD_MIN_LENGTH:-12}
      GOTRUE_SMTP_HOST: ${SMTP_HOST}
      GOTRUE_SMTP_PORT: ${SMTP_PORT}
      GOTRUE_SMTP_USER: ${SMTP_USER}
      GOTRUE_SMTP_PASS: ${SMTP_PASS}
      GOTRUE_SMTP_ADMIN_EMAIL: ${SMTP_ADMIN_EMAIL}
      GOTRUE_MAILER_URLPATHS_INVITE: "/auth/v1/verify"
      GOTRUE_MAILER_URLPATHS_CONFIRMATION: "/auth/v1/verify"
      GOTRUE_MAILER_URLPATHS_RECOVERY: "/auth/v1/verify"
      GOTRUE_MAILER_URLPATHS_EMAIL_CHANGE: "/auth/v1/verify"
      # OTP: 10-minute expiry; one-time use enforced by GoTrue
      GOTRUE_MAILER_OTP_EXP: "600"
      GOTRUE_MAILER_TEMPLATES_CONFIRMATION: "/etc/gotrue/templates/confirmation.html"
    volumes:
      - ./infra/supabase/templates:/etc/gotrue/templates:ro
    networks:
      - supabase_net
    depends_on:
      supabase-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:9999/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 256m

  supabase-rest:
    image: postgrest/postgrest:v14.8
    container_name: wekala-supabase-rest
    restart: unless-stopped
    environment:
      PGRST_DB_URI: postgres://authenticator:${POSTGRES_PASSWORD}@supabase-db:5432/postgres
      PGRST_DB_SCHEMAS: public,storage,graphql_public
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${SUPABASE_JWT_SECRET}
      PGRST_DB_USE_LEGACY_GUCS: "false"
      PGRST_APP_SETTINGS_JWT_SECRET: ${SUPABASE_JWT_SECRET}
      PGRST_APP_SETTINGS_JWT_EXP: ${JWT_EXPIRY}
    networks:
      - supabase_net
    depends_on:
      supabase-db:
        condition: service_healthy
    healthcheck:
      disable: true
    deploy:
      resources:
        limits:
          memory: 256m

  supabase-realtime:
    image: supabase/realtime:v2.76.5
    container_name: wekala-supabase-realtime
    restart: unless-stopped
    environment:
      PORT: 4000
      DB_HOST: supabase-db
      DB_PORT: 5432
      DB_USER: supabase_admin
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: postgres
      DB_AFTER_CONNECT_QUERY: "SET search_path TO _realtime"
      DB_ENC_KEY: supabaserealtime
      API_JWT_SECRET: ${SUPABASE_JWT_SECRET}
      FLY_ALLOC_ID: fly123
      FLY_APP_NAME: realtime
      APP_NAME: realtime
      SECRET_KEY_BASE: UpNVntn3cDxHJpq99YMc1T1AQgQpc8kfYTuRgBiYa15BLrx8etQoXz3gZv1/u2oq
      ERL_AFLAGS: -proto_dist inet_tcp
      ENABLE_TAILSCALE: "false"
      DNS_NODES: "''"
    networks:
      - supabase_net
    depends_on:
      supabase-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:4000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 256m

  supabase-storage:
    image: supabase/storage-api:v1.48.26
    container_name: wekala-supabase-storage
    restart: unless-stopped
    environment:
      ANON_KEY: ${SUPABASE_ANON_KEY}
      SERVICE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      POSTGREST_URL: http://supabase-rest:3000
      PGRST_JWT_SECRET: ${SUPABASE_JWT_SECRET}
      DATABASE_URL: postgres://supabase_storage_admin:${POSTGRES_PASSWORD}@supabase-db:5432/postgres
      FILE_SIZE_LIMIT: 52428800
      STORAGE_BACKEND: file
      FILE_STORAGE_BACKEND_PATH: /var/lib/storage
      TENANT_ID: stub
      REGION: local
      GLOBAL_S3_BUCKET: stub
      ENABLE_IMAGE_TRANSFORMATION: "true"
      IMGPROXY_URL: http://supabase-imgproxy:5001
    volumes:
      - supabase-storage-data:/var/lib/storage
    networks:
      - supabase_net
    depends_on:
      supabase-db:
        condition: service_healthy
      supabase-rest:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:5000/status',r=>process.exit(r.statusCode<400?0:1)).on('error',()=>process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 256m

  supabase-imgproxy:
    image: darthsim/imgproxy:v3.30.1
    container_name: wekala-supabase-imgproxy
    restart: unless-stopped
    environment:
      IMGPROXY_BIND: ":5001"
      IMGPROXY_LOCAL_FILESYSTEM_ROOT: /
      IMGPROXY_USE_ETAG: "true"
      IMGPROXY_ENABLE_WEBP_DETECTION: "true"
    volumes:
      - supabase-storage-data:/var/lib/storage:ro
    networks:
      - supabase_net
    healthcheck:
      test: ["CMD", "imgproxy", "health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 128m

  supabase-meta:
    image: supabase/postgres-meta:v0.96.3
    container_name: wekala-supabase-meta
    restart: unless-stopped
    environment:
      PG_META_PORT: 8080
      PG_META_DB_HOST: supabase-db
      PG_META_DB_PORT: 5432
      PG_META_DB_USER: supabase_admin
      PG_META_DB_PASSWORD: ${POSTGRES_PASSWORD}
      PG_META_DB_NAME: postgres
    networks:
      - supabase_net
    depends_on:
      supabase-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:8080/',r=>process.exit(r.statusCode<400?0:1)).on('error',()=>process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 128m

  # ===========================================================================
  # DIFY — Agent runtime (API + Worker + Web + Sandbox + DB + Redis)
  # Web UI on port 3000. Internal API on 5001.
  # ===========================================================================

  dify-db:
    image: postgres:16-alpine
    container_name: wekala-dify-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: dify
      POSTGRES_USER: dify
      POSTGRES_PASSWORD: ${DIFY_DB_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - dify-db-data:/var/lib/postgresql/data
    networks:
      - dify_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dify -d dify"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 256m

  dify-redis:
    image: redis:7.4-alpine
    container_name: wekala-dify-redis
    restart: unless-stopped
    command: redis-server --requirepass ${DIFY_REDIS_PASSWORD} --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - dify-redis-data:/data
    networks:
      - dify_net
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${DIFY_REDIS_PASSWORD} ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 128m

  dify-sandbox:
    image: langgenius/dify-sandbox:0.2.15
    container_name: wekala-dify-sandbox
    restart: unless-stopped
    environment:
      API_KEY: ${DIFY_SANDBOX_API_KEY}
      GIN_MODE: release
      WORKER_TIMEOUT: 15
    networks:
      - dify_net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8194/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512m

  dify-api: &dify-api
    image: langgenius/dify-api:1.14.1
    container_name: wekala-dify-api
    restart: unless-stopped
    environment:
      MODE: api
      LOG_LEVEL: INFO
      # Phase 14 — plugin daemon (Dify 1.x model providers are plugins)
      PLUGIN_DAEMON_URL: http://plugin-daemon:5002
      PLUGIN_DAEMON_KEY: ${DIFY_PLUGIN_DAEMON_KEY}
      INNER_API_KEY_FOR_PLUGIN: ${DIFY_PLUGIN_INNER_API_KEY}
      PLUGIN_REMOTE_INSTALL_HOST: plugin-daemon
      PLUGIN_REMOTE_INSTALL_PORT: 5003
      MARKETPLACE_ENABLED: "true"
      MARKETPLACE_API_URL: https://marketplace.dify.ai
      # Server-to-server console access: bypasses CSRF + authenticates as the
      # workspace owner via the X-WORKSPACE-ID header (Wekala DifyAdapter uses this).
      ADMIN_API_KEY_ENABLE: "true"
      ADMIN_API_KEY: ${DIFY_ADMIN_API_KEY}
      SECRET_KEY: ${DIFY_SECRET_KEY}
      CONSOLE_WEB_URL: "http://localhost:3000"
      INIT_PASSWORD: ""
      CONSOLE_API_URL: "http://localhost:5001"
      SERVICE_API_URL: "http://localhost:5001"
      APP_WEB_URL: "http://localhost:3000"
      # Browser hits dify-api directly (no nginx proxy in this stack), so allow
      # the dify-web origin. POC-wide "*"; tighten to http://localhost:3000 later.
      WEB_API_CORS_ALLOW_ORIGINS: "*"
      CONSOLE_CORS_ALLOW_ORIGINS: "*"
      CHECK_UPDATE_URL: ""
      OPENAI_API_BASE: ""
      DB_USERNAME: dify
      DB_PASSWORD: ${DIFY_DB_PASSWORD}
      DB_HOST: dify-db
      DB_PORT: 5432
      DB_DATABASE: dify
      REDIS_HOST: dify-redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${DIFY_REDIS_PASSWORD}
      REDIS_DB: 0
      CELERY_BROKER_URL: redis://:${DIFY_REDIS_PASSWORD}@dify-redis:6379/1
      BROKER_USE_SSL: "false"
      STORAGE_TYPE: ${DIFY_STORAGE_TYPE}
      STORAGE_LOCAL_PATH: /app/api/storage
      SANDBOX_HOST: dify-sandbox
      SANDBOX_PORT: 8194
      SANDBOX_API_KEY: ${DIFY_SANDBOX_API_KEY}
      OLLAMA_API_BASE: ${OLLAMA_BASE_URL}
      OLLAMA_API_KEY: ollama
      MIGRATION_ENABLED: "true"
    volumes:
      - dify-storage-data:/app/api/storage
    ports:
      # Exposed so the browser-side Dify console (port 3000) can reach the
      # console API directly. The Wekala API still uses the internal host.
      - "5001:5001"
    networks:
      - dify_net
      - wekala_net
    depends_on:
      dify-db:
        condition: service_healthy
      dify-redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5001/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 1g

  dify-worker:
    <<: *dify-api
    container_name: wekala-dify-worker
    ports: []  # don't inherit dify-api's host port mapping (would clash on 5001)
    environment:
      MODE: worker
      LOG_LEVEL: INFO
      SECRET_KEY: ${DIFY_SECRET_KEY}
      DB_USERNAME: dify
      DB_PASSWORD: ${DIFY_DB_PASSWORD}
      DB_HOST: dify-db
      DB_PORT: 5432
      DB_DATABASE: dify
      REDIS_HOST: dify-redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${DIFY_REDIS_PASSWORD}
      REDIS_DB: 0
      CELERY_BROKER_URL: redis://:${DIFY_REDIS_PASSWORD}@dify-redis:6379/1
      BROKER_USE_SSL: "false"
      STORAGE_TYPE: ${DIFY_STORAGE_TYPE}
      STORAGE_LOCAL_PATH: /app/api/storage
      SANDBOX_HOST: dify-sandbox
      SANDBOX_PORT: 8194
      SANDBOX_API_KEY: ${DIFY_SANDBOX_API_KEY}
      OLLAMA_API_BASE: ${OLLAMA_BASE_URL}
      OLLAMA_API_KEY: ollama
      MIGRATION_ENABLED: "false"
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.celery inspect ping || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 1g

  dify-web:
    image: langgenius/dify-web:1.14.1
    container_name: wekala-dify-web
    restart: unless-stopped
    environment:
      CONSOLE_API_URL: "http://localhost:5001"
      APP_API_URL: "http://localhost:5001"
      MARKETPLACE_API_URL: "https://marketplace.dify.ai"
      MARKETPLACE_URL: "https://marketplace.dify.ai"
      SENTRY_DSN: ""
      NEXT_TELEMETRY_DISABLED: "1"
      HOSTNAME: "0.0.0.0"
    ports:
      - "3000:3000"
    networks:
      - dify_net
      - wekala_net
    depends_on:
      dify-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000/',r=>process.exit(r.statusCode<400?0:1)).on('error',()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512m

  # ===========================================================================
  # DIFY PLUGIN DAEMON — In Dify 1.x, model providers (Ollama, etc.) are plugins
  # served by this daemon. Required for the model-provider console + agent runs.
  # ===========================================================================

  plugin-daemon:
    image: langgenius/dify-plugin-daemon:0.6.0-local
    container_name: wekala-dify-plugin-daemon
    restart: unless-stopped
    environment:
      DB_USERNAME: dify
      DB_PASSWORD: ${DIFY_DB_PASSWORD}
      DB_HOST: dify-db
      DB_PORT: 5432
      DB_DATABASE: dify_plugin
      DB_SSL_MODE: disable
      REDIS_HOST: dify-redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${DIFY_REDIS_PASSWORD}
      SERVER_PORT: 5002
      SERVER_KEY: ${DIFY_PLUGIN_DAEMON_KEY}
      DIFY_INNER_API_URL: http://dify-api:5001
      DIFY_INNER_API_KEY: ${DIFY_PLUGIN_INNER_API_KEY}
      PLUGIN_REMOTE_INSTALLING_HOST: 0.0.0.0
      PLUGIN_REMOTE_INSTALLING_PORT: 5003
      PLUGIN_WORKING_PATH: /app/storage/cwd
      FORCE_VERIFYING_SIGNATURE: "false"
      PLUGIN_STORAGE_TYPE: local
      PLUGIN_STORAGE_LOCAL_ROOT: /app/storage
      PLUGIN_INSTALLED_PATH: plugin
      PLUGIN_PACKAGE_CACHE_PATH: plugin_packages
      PLUGIN_MEDIA_CACHE_PATH: assets
      MARKETPLACE_ENABLED: "true"
      MARKETPLACE_API_URL: https://marketplace.dify.ai
      # Same proxy negative-serial TLS workaround as ollama (marketplace = Go HTTPS).
      GODEBUG: x509negativeserial=1
    volumes:
      - dify-plugin-data:/app/storage
    networks:
      - dify_net
      - wekala_net
    depends_on:
      dify-db:
        condition: service_healthy
      dify-redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512m

  # ===========================================================================
  # OLLAMA — Local LLM serving (GPU-accelerated via NVIDIA runtime)
  # API on port 11434. Model weights live in ollama-data volume.
  # ===========================================================================

  ollama:
    image: ollama/ollama:0.24.0
    container_name: wekala-ollama
    restart: unless-stopped
    environment:
      OLLAMA_HOST: 0.0.0.0
      OLLAMA_KEEP_ALIVE: 5m
      # Tolerate registry/proxy TLS certs with negative serial numbers (Go 1.23+
      # rejects them by default; common behind enterprise MITM proxies). Lets
      # `ollama pull` fetch manifests from registry.ollama.ai through such proxies.
      GODEBUG: x509negativeserial=1
    volumes:
      - ollama-data:/root/.ollama
    ports:
      - "11434:11434"
    networks:
      - wekala_net
    # GPU passthrough — comment out if no NVIDIA GPU / NVIDIA Container Toolkit not installed
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ===========================================================================
  # MEILISEARCH — Full-text search engine
  # API on port 7700. English tokenizer default; multilingual added Phase 10.
  # ===========================================================================

  meilisearch:
    image: getmeili/meilisearch:v1.43.1
    container_name: wekala-meilisearch
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}
      MEILI_ENV: ${MEILI_ENV}
      MEILI_DB_PATH: /meili_data
      MEILI_LOG_LEVEL: WARN
    volumes:
      - meilisearch-data:/meili_data
    ports:
      - "7700:7700"
    networks:
      - wekala_net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:7700/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512m

  # ===========================================================================
  # N8N — Workflow automation / connector hub (500+ integrations)
  # UI on port 5678. Credentials encrypted at rest via N8N_ENCRYPTION_KEY.
  # ===========================================================================

  n8n:
    image: n8nio/n8n:2.20.9
    container_name: wekala-n8n
    restart: unless-stopped
    environment:
      # User management ENABLED — each Wekala user gets a private n8n user via
      # the Wekala→n8n auth bridge (apps/api/wekala/adapters/n8n + services/
      # n8n_provisioning.py + api/v1/n8n.py). Owner is bootstrapped once on
      # first boot by the Wekala API using WEKALA_N8N_OWNER_* credentials.
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      N8N_USER_MANAGEMENT_JWT_SECRET: ${N8N_USER_MANAGEMENT_JWT_SECRET}
      # JWT cookie lifetime — matches Wekala session lifetime so canvas
      # access window aligns with the Supabase JWT window.
      N8N_USER_MANAGEMENT_JWT_DURATION_HOURS: "8"
      N8N_HOST: localhost
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      # Served under /n8n/ via the Wekala Next.js reverse proxy so the
      # browser sees same-origin (localhost:3002) and X-Frame-Options no
      # longer blocks iframe embedding inside Wekala.
      N8N_PATH: /n8n/
      N8N_EDITOR_BASE_URL: http://localhost:3002/n8n/
      N8N_PROXY_HOPS: "1"
      N8N_SECURE_COOKIE: "false"
      N8N_HIRING_BANNER_ENABLED: "false"
      N8N_DIAGNOSTICS_ENABLED: "false"
      # Sovereignty policy: hide every cloud-hosted LLM node so the canvas
      # only exposes local-first options. All AI inference runs on the
      # Ollama container next door. Keep this list in sync with Phase 6
      # gatekeeper rules — cloud nodes are PDPL-prohibited for Internal,
      # Restricted, and Confidential agents.
      NODES_EXCLUDE: >-
        ["n8n-nodes-base.openAi",
         "@n8n/n8n-nodes-langchain.lmChatOpenAi",
         "@n8n/n8n-nodes-langchain.lmOpenAi",
         "@n8n/n8n-nodes-langchain.embeddingsOpenAi",
         "@n8n/n8n-nodes-langchain.openAi",
         "@n8n/n8n-nodes-langchain.lmChatAnthropic",
         "@n8n/n8n-nodes-langchain.lmAnthropic",
         "@n8n/n8n-nodes-langchain.lmChatGoogleGemini",
         "@n8n/n8n-nodes-langchain.lmChatGoogleVertex",
         "@n8n/n8n-nodes-langchain.lmChatGooglePalm",
         "@n8n/n8n-nodes-langchain.embeddingsGoogleGemini",
         "@n8n/n8n-nodes-langchain.embeddingsGoogleVertex",
         "@n8n/n8n-nodes-langchain.googleGemini",
         "@n8n/n8n-nodes-langchain.lmChatAwsBedrock",
         "@n8n/n8n-nodes-langchain.lmAwsBedrock",
         "@n8n/n8n-nodes-langchain.embeddingsAwsBedrock",
         "@n8n/n8n-nodes-langchain.lmChatAzureOpenAi",
         "@n8n/n8n-nodes-langchain.embeddingsAzureOpenAi",
         "@n8n/n8n-nodes-langchain.lmChatCohere",
         "@n8n/n8n-nodes-langchain.embeddingsCohere",
         "@n8n/n8n-nodes-langchain.lmCohere",
         "@n8n/n8n-nodes-langchain.lmChatMistralCloud",
         "@n8n/n8n-nodes-langchain.embeddingsMistralCloud",
         "@n8n/n8n-nodes-langchain.lmChatGroq",
         "@n8n/n8n-nodes-langchain.lmChatDeepSeek",
         "@n8n/n8n-nodes-langchain.lmChatXAiGrok",
         "@n8n/n8n-nodes-langchain.lmChatPerplexity",
         "@n8n/n8n-nodes-langchain.lmChatOpenRouter",
         "@n8n/n8n-nodes-langchain.lmOpenHuggingFaceInference",
         "@n8n/n8n-nodes-langchain.embeddingsHuggingFaceInference",
         "@n8n/n8n-nodes-langchain.lmChatAlibabaCloud",
         "@n8n/n8n-nodes-langchain.lmChatLemonade",
         "@n8n/n8n-nodes-langchain.lmLemonade",
         "@n8n/n8n-nodes-langchain.embeddingsLemonade",
         "@n8n/n8n-nodes-langchain.lmChatMinimax",
         "@n8n/n8n-nodes-langchain.lmChatMoonshot",
         "@n8n/n8n-nodes-langchain.lmOllama",
         "@n8n/n8n-nodes-langchain.modelSelector",
         "@n8n/n8n-nodes-langchain.embeddingsCloudflareWorkersAi",
         "@n8n/n8n-nodes-langchain.lmChatCloudflareWorkersAi",
         "@n8n/n8n-nodes-langchain.lmChatOllama",
         "@n8n/n8n-nodes-langchain.embeddingsOllama",
         "@n8n/n8n-nodes-langchain.lmChatVercelAiGateway",
         "@n8n/n8n-nodes-langchain.anthropic",
         "@n8n/n8n-nodes-langchain.ollama",
         "@n8n/n8n-nodes-langchain.minimax",
         "@n8n/n8n-nodes-langchain.moonshot",
         "@n8n/n8n-nodes-langchain.alibabaCloud"]
      # Phase B: load Wekala-branded model nodes (per-model wrappers around
      # @langchain/ollama). The generic lmChatOllama / embeddingsOllama
      # nodes are hidden above so the palette presents one curated, branded
      # entry per locally-pulled model.
      N8N_CUSTOM_EXTENSIONS: /data/custom-nodes
      WEBHOOK_URL: http://localhost:3002/n8n/
      GENERIC_TIMEZONE: Asia/Muscat
      N8N_LOG_LEVEL: warn
    volumes:
      - n8n-data:/home/node/.n8n
      - ./packages/n8n-nodes-wekala:/data/custom-nodes/n8n-nodes-wekala:ro
    ports:
      - "5678:5678"
    networks:
      - wekala_net
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:5678/healthz',r=>process.exit(r.statusCode<400?0:1)).on('error',()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512m

  # ===========================================================================
  # LANGFUSE — LLM observability (traces, evals, costs)
  # UI on port 3001. Each workspace gets its own Langfuse project.
  # ===========================================================================

  # ---------------------------------------------------------------------------
  # ClickHouse — required by Langfuse v3 for event/trace storage
  # ---------------------------------------------------------------------------
  clickhouse:
    image: clickhouse/clickhouse-server:24.8-alpine
    container_name: wekala-clickhouse
    restart: unless-stopped
    environment:
      CLICKHOUSE_DB: default
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
    volumes:
      - clickhouse-data:/var/lib/clickhouse
    networks:
      - langfuse_net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://127.0.0.1:8123/ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512m

  langfuse-db:
    image: postgres:16-alpine
    container_name: wekala-langfuse-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: langfuse
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: ${LANGFUSE_DB_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - langfuse-db-data:/var/lib/postgresql/data
    networks:
      - langfuse_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langfuse -d langfuse"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 256m

  langfuse:
    image: langfuse/langfuse:3.174.1
    container_name: wekala-langfuse
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://langfuse:${LANGFUSE_DB_PASSWORD}@langfuse-db:5432/langfuse
      DIRECT_URL: postgresql://langfuse:${LANGFUSE_DB_PASSWORD}@langfuse-db:5432/langfuse
      NEXTAUTH_URL: http://localhost:3001
      NEXTAUTH_SECRET: ${LANGFUSE_NEXTAUTH_SECRET}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY}
      PORT: 3000
      HOSTNAME: "0.0.0.0"
      LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES: "false"
      TELEMETRY_ENABLED: "false"
      SALT: ${LANGFUSE_SALT}
      NODE_OPTIONS: "--max-old-space-size=896"
      CLICKHOUSE_URL: http://clickhouse:8123
      CLICKHOUSE_MIGRATION_URL: clickhouse://clickhouse:9000
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
      CLICKHOUSE_CLUSTER_ENABLED: "false"
      LANGFUSE_S3_EVENT_UPLOAD_ENABLED: "false"
      LANGFUSE_S3_EVENT_UPLOAD_BUCKET: langfuse-events
      LANGFUSE_S3_EVENT_UPLOAD_REGION: us-east-1
      LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID: unused
      LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: unused
      LANGFUSE_S3_MEDIA_UPLOAD_ENABLED: "false"
      LANGFUSE_S3_MEDIA_UPLOAD_BUCKET: langfuse-media
      LANGFUSE_S3_MEDIA_UPLOAD_REGION: us-east-1
      LANGFUSE_S3_MEDIA_UPLOAD_ACCESS_KEY_ID: unused
      LANGFUSE_S3_MEDIA_UPLOAD_SECRET_ACCESS_KEY: unused
    ports:
      - "3001:3000"
    networks:
      - langfuse_net
      - wekala_net
    depends_on:
      langfuse-db:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000/api/public/health',r=>process.exit(r.statusCode<400?0:1)).on('error',()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    deploy:
      resources:
        limits:
          memory: 1024m

  # ===========================================================================
  # MAILHOG — Local SMTP server for development email testing
  # SMTP on port 1025 · Web UI on port 8025
  # ===========================================================================

  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: wekala-mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - wekala_net
      - supabase_net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:8025 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 64m

  # ===========================================================================
  # CLAMAV — Virus scanner sidecar (Phase 4: document upload safety)
  # Listens on TCP 3310 (clamd default config). Needs ~1.2 GB RAM to load
  # virus databases (3.3M sigs). No memory limit — ClamAV is a safety control.
  # start_period: 300s — first-boot freshclam download + clamd DB load.
  # ===========================================================================

  wekala-clamav:
    image: clamav/clamav:1.4
    container_name: wekala-clamav
    restart: unless-stopped
    networks:
      - wekala_net
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 3310"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 300s

  # ===========================================================================
  # WEKALA API — FastAPI backend (Phase 1: auth, workspaces, RBAC)
  # Internal only — exposed via Kong at /api/v1/*. No direct external port.
  # ===========================================================================

  wekala-api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: wekala-api
    restart: unless-stopped
    environment:
      WEKALA_ENV: development
      WEKALA_SECRET_KEY: ${WEKALA_SECRET_KEY}
      DATABASE_URL: postgresql+asyncpg://postgres:${POSTGRES_PASSWORD}@supabase-db:5432/postgres
      WEKALA_SUPABASE_URL: http://supabase-kong:8000
      WEKALA_SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      SUPABASE_JWT_SECRET: ${SUPABASE_JWT_SECRET}
      OPA_URL: http://opa:8181
      # Phase 14 — Dify agent runtime (server-to-server via ADMIN_API_KEY)
      DIFY_BASE_URL: http://dify-api:5001
      DIFY_CONSOLE_TOKEN: ${DIFY_ADMIN_API_KEY}
      DIFY_WORKSPACE_ID: ${DIFY_WORKSPACE_ID}
      # Phase 4 — Knowledge Base & RAG
      CLAMAV_HOST: wekala-clamav
      CLAMAV_PORT: "3310"
      OLLAMA_URL: http://ollama:11434
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-bge-m3}
      EMBEDDING_BATCH_SIZE: "32"
      DOCUMENT_MAX_MB: "50"
      DOCUMENT_CHUNK_TOKENS: "1024"
      DOCUMENT_CHUNK_OVERLAP: "128"
      SUPABASE_STORAGE_URL: http://supabase-storage:5000
      # Phase 5 — Tools & MCP
      MCP_BUILTIN_HOSTNAMES: ${MCP_BUILTIN_HOSTNAMES:-wekala-mcp-time}
      # Phase 6 — Gatekeeper
      WEKALA_CLASSIFICATION_POLICY_PATH: /policies/classification.yaml
      # Phase B multi-tenancy — Wekala→n8n auth bridge
      N8N_INTERNAL_URL: http://wekala-n8n:5678
      N8N_USER_MANAGEMENT_JWT_SECRET: ${N8N_USER_MANAGEMENT_JWT_SECRET}
      WEKALA_N8N_OWNER_EMAIL: ${WEKALA_N8N_OWNER_EMAIL}
      WEKALA_N8N_OWNER_PASSWORD: ${WEKALA_N8N_OWNER_PASSWORD}
      WEKALA_N8N_OWNER_FIRST_NAME: ${WEKALA_N8N_OWNER_FIRST_NAME:-Wekala}
      WEKALA_N8N_OWNER_LAST_NAME: ${WEKALA_N8N_OWNER_LAST_NAME:-System}
      # Fernet key for encrypting per-user n8n passwords at rest.
      WEKALA_FIELD_ENCRYPTION_KEY: ${WEKALA_FIELD_ENCRYPTION_KEY}
    volumes:
      - ./infra/policies:/policies:ro
    ports:
      - "8001:8001"
    networks:
      - wekala_net
      - supabase_net
    depends_on:
      supabase-db:
        condition: service_healthy
      opa:
        condition: service_healthy
      wekala-clamav:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/healthz')\" || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512m

  # ===========================================================================
  # WEKALA WEB — Next.js 15 frontend (Phase 1: login, signup, dashboard)
  # UI on port 3002.
  # ===========================================================================

  wekala-web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: dev
    container_name: wekala-web
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8001
      # Server-side fetches inside the web container can't reach localhost:8001
      # (host port). Use the internal docker-network hostname instead.
      INTERNAL_API_URL: http://wekala-api:8001
      NEXT_PUBLIC_SUPABASE_URL: ${SUPABASE_PUBLIC_URL}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      HOSTNAME: "0.0.0.0"
      PORT: "3002"
      WATCHPACK_POLLING: "true"
    volumes:
      # Bind-mount source for hot-reload; anonymous volumes shadow node_modules and .next
      # so the container's copies are preserved (host doesn't have them).
      - ./apps/web:/app/apps/web
      - /app/apps/web/node_modules
      - /app/apps/web/.next
    ports:
      - "3002:3002"
    networks:
      - wekala_net
    depends_on:
      wekala-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3002/',r=>process.exit(r.statusCode<400?0:1)).on('error',()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    deploy:
      resources:
        limits:
          memory: 1g

  # ===========================================================================
  # Built-in MCP servers (Phase 5)
  # Internal only — wekala-api invokes them via the registered MCP URL.
  # Hostnames listed in MCP_BUILTIN_HOSTNAMES bypass the SSRF check.
  # ===========================================================================

  wekala-mcp-time:
    build:
      context: ./packages/mcp-servers/time
      dockerfile: Dockerfile
    container_name: wekala-mcp-time
    restart: unless-stopped
    networks:
      - wekala_net
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request,sys; sys.exit(0 if urllib.request.urlopen(\"http://localhost:3334/health\",timeout=3).status==200 else 1)'"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 128m

  # ===========================================================================
  # OPA — Open Policy Agent sidecar (Phase 1: RBAC authorization)
  # Internal only — wekala-api calls http://opa:8181. No external port.
  # ===========================================================================

  opa:
    image: openpolicyagent/opa:0.70.0
    container_name: wekala-opa
    restart: unless-stopped
    command: ["run", "--server", "--addr", "0.0.0.0:8181", "/policies"]
    volumes:
      - ./infra/opa/policies:/policies:ro
    ports:
      - "8181:8181"
    networks:
      - wekala_net
    healthcheck:
      # OPA image is distroless (no shell/wget/curl); use the opa binary itself.
      # One-shot eval verifies the binary and policies parse cleanly.
      test: ["CMD", "/opa", "eval", "-d", "/policies", "true"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 128m

# =============================================================================
# VOLUMES — All persistent data stored in named volumes
# =============================================================================

volumes:
  supabase-db-data:
    driver: local
  supabase-storage-data:
    driver: local
  dify-db-data:
    driver: local
  dify-redis-data:
    driver: local
  dify-storage-data:
    driver: local
  dify-plugin-data:
    driver: local
  ollama-data:
    driver: local
  meilisearch-data:
    driver: local
  n8n-data:
    driver: local
  langfuse-db-data:
    driver: local
  clickhouse-data:
    driver: local

# =============================================================================
# NETWORKS
# Internal networks isolate service groups; wekala_net is the shared fabric.
# =============================================================================

networks:
  wekala_net:
    driver: bridge
    name: wekala_net
  supabase_net:
    driver: bridge
    name: wekala_supabase_net
    internal: false
  dify_net:
    driver: bridge
    name: wekala_dify_net
    internal: false
  langfuse_net:
    driver: bridge
    name: wekala_langfuse_net
    internal: false
